<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jadro — Spline Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:#0F0A1F;
    --muted:#a89ec4;
    --light:#FFFFFF;
    --accent:#E8B0E0;
  }

  html, body { width: 100%; height: 100%; }

  body {
    background: #0F0A1F;
    color: var(--light);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    overflow: hidden;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 36px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(15,10,31,0.35), transparent);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.14em;
    color: var(--light);
    text-transform: uppercase;
    text-shadow: 0 2px 20px rgba(255,255,255,0.15);
  }
  .logo span {
    background: linear-gradient(120deg, #FFB7E8, #FFCC9B);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #loadStatus {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.08em;
    transition: opacity 0.6s;
    margin-left: auto;
  }

  #core3d {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
    transition: filter 0.5s ease;
    background:
      radial-gradient(ellipse 70% 50% at 22% 30%, rgba(80,40,90,0.45), transparent 60%),
      radial-gradient(ellipse 60% 50% at 78% 75%, rgba(60,30,70,0.35), transparent 60%),
      radial-gradient(ellipse 50% 70% at 55% 50%, rgba(35,25,75,0.5), transparent 65%),
      linear-gradient(135deg, #060410 0%, #0a0820 35%, #100a25 65%, #050410 100%);
  }
  #core3d.dragging { cursor: grabbing; }
  #core3d.dimmed { filter: blur(10px) brightness(0.55) saturate(1.2); }
  #core3d canvas { display: block; width: 100%; height: 100%; }

  /* Hviezdny závoj */
  #core3d::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 45% 35%, rgba(200,160,220,0.35), transparent),
      radial-gradient(1px 1px at 65% 85%, rgba(160,180,220,0.4), transparent),
      radial-gradient(1px 1px at 5% 50%, rgba(220,180,160,0.3), transparent),
      radial-gradient(2px 2px at 95% 45%, rgba(200,140,180,0.3), transparent);
    background-size: 380px 380px, 320px 320px, 260px 260px, 420px 420px, 290px 290px, 360px 360px, 240px 240px, 310px 310px;
    opacity: 0.5;
    pointer-events: none;
  }

  #coreHint {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    font-size: 10.5px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 50;
    text-shadow: 0 1px 12px rgba(0,0,0,0.4);
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(15,10,31,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 88vw;
    max-height: 86vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1),
      0 40px 120px rgba(0,0,0,0.6),
      0 0 80px rgba(232,138,205,0.15);
    animation: lbZoomIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes lbZoomIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lb-btn {
    position: absolute;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.9);
    border-radius: 50%;
    cursor: pointer;
    backdrop-filter: blur(14px);
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lb-btn:hover {
    background: linear-gradient(120deg, #FFB7E8, #FFCC9B);
    color: #2a1850;
    border-color: transparent;
    transform: scale(1.08);
  }
  #lbPrev:hover, #lbNext:hover { transform: translateY(-50%) scale(1.08); }
  #lbClose { top: 28px; right: 28px; width: 44px; height: 44px; font-size: 22px; }
  #lbPrev  { left: 28px; top: 50%; transform: translateY(-50%); width: 54px; height: 54px; font-size: 26px; }
  #lbNext  { right: 28px; top: 50%; transform: translateY(-50%); width: 54px; height: 54px; font-size: 26px; }

  #lbCounter {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.12em;
  }

  @media (max-width: 600px) {
    #lbPrev { left: 8px; width: 46px; height: 46px; }
    #lbNext { right: 8px; width: 46px; height: 46px; }
    #lightbox { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Kornelsson<span>.</span></div>
  <div id="loadStatus">Načítavam obrázky...</div>
</header>

<div id="core3d"></div>
<div id="coreHint">Ťahaj myšou · Klikni obrázok pre detail</div>

<div id="lightbox">
  <button class="lb-btn" id="lbClose">×</button>
  <button class="lb-btn" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt="" />
  <button class="lb-btn" id="lbNext">›</button>
  <div id="lbCounter"></div>
</div>

<script>
// ─── FIREBASE ───
const firebaseConfig = {
  apiKey:            "AIzaSyDzwgVupB_pDsoHZiG8JvQLx5QZy-BXdNY",
  authDomain:        "kornelsson-bea69.firebaseapp.com",
  projectId:         "kornelsson-bea69",
  storageBucket:     "kornelsson-bea69.firebasestorage.app",
  messagingSenderId: "129211041007",
  appId:             "1:129211041007:web:5923134219948f8bdbc71a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function picUrl(img, size) {
  if (img.url) return img.url;
  return `https://picsum.photos/id/${img.id}/${size || 200}/${size || 200}`;
}

// Fallback mock
let allImages = [
  64, 91, 177, 219, 338, 494, 628, 717,
  11, 28, 109, 119, 169, 248, 365, 559,
  0, 31, 79, 122, 161, 233, 360, 451,
  250, 350, 450, 550, 650, 750, 855, 1015
].map(id => ({ id }));

// ─── HELPER: rounded image texture ───
function makeRoundedTexture(image, radiusPct) {
  const w = image.naturalWidth || image.width;
  const h = image.naturalHeight || image.height;
  const canvas = document.createElement('canvas');
  // limit max size to keep texture memory manageable
  const maxDim = 512;
  const scale = Math.min(1, maxDim / Math.max(w, h));
  canvas.width  = Math.round(w * scale);
  canvas.height = Math.round(h * scale);
  const ctx = canvas.getContext('2d');
  const r = Math.min(canvas.width, canvas.height) * (radiusPct || 0.06);
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(canvas.width - r, 0);
  ctx.quadraticCurveTo(canvas.width, 0, canvas.width, r);
  ctx.lineTo(canvas.width, canvas.height - r);
  ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - r, canvas.height);
  ctx.lineTo(r, canvas.height);
  ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace || THREE.sRGBEncoding;
  return tex;
}

// ─── THREE.JS SCÉNA ───
let coreScene, coreCamera, coreRenderer, coreGroup;
let coreBlob, coreGlow, coreHalo;
let coreParticles;
let coreImages = [];
let coreRaycaster, coreMouse, coreHoveredObj = null;
let coreDragState = { dragging: false, lastX: 0, lastY: 0, rotX: 0, rotY: 0, moved: false };
let lightboxOpen = false;
let lightboxIdx = 0;
let clock;

function initCore() {
  clock = new THREE.Clock();
  const container = document.getElementById('core3d');
  const w = container.clientWidth;
  const h = container.clientHeight;

  coreScene = new THREE.Scene();
  coreCamera = new THREE.PerspectiveCamera(55, w / h, 0.1, 200);
  coreCamera.position.set(0, 0, 14);

  coreRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  coreRenderer.setSize(w, h);
  coreRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  coreRenderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(coreRenderer.domElement);

  coreGroup = new THREE.Group();
  coreScene.add(coreGroup);

  // ── LIGHTS (mäkké, farebné) ──
  coreScene.add(new THREE.AmbientLight(0xffffff, 0.45));

  const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
  keyLight.position.set(6, 8, 5);
  coreScene.add(keyLight);

  const pinkLight = new THREE.PointLight(0xff79c6, 2.5, 30);
  pinkLight.position.set(-6, 3, 4);
  coreScene.add(pinkLight);

  const peachLight = new THREE.PointLight(0xffb088, 2.0, 30);
  peachLight.position.set(5, -4, 3);
  coreScene.add(peachLight);

  const violetLight = new THREE.PointLight(0x9a7bff, 1.5, 25);
  violetLight.position.set(0, 5, -5);
  coreScene.add(violetLight);

  // ── CENTRÁLNY ORGANICKÝ BLOB (sklenený) ──
  function makeOrganic(radius, detail, seed, noiseScale) {
    const geom = new THREE.IcosahedronGeometry(radius, detail);
    const positions = geom.attributes.position;
    for (let i = 0; i < positions.count; i++) {
      const v = new THREE.Vector3().fromBufferAttribute(positions, i);
      const n =
        Math.sin(v.x * 1.4 + seed)        * noiseScale +
        Math.cos(v.y * 1.7 + seed * 1.3)  * noiseScale * 1.1 +
        Math.sin(v.z * 1.3 + seed * 2.1)  * noiseScale * 0.9 +
        Math.cos(v.x * 0.8 + v.y * 0.6 + seed) * noiseScale * 0.5;
      v.normalize().multiplyScalar(radius + n);
      positions.setXYZ(i, v.x, v.y, v.z);
    }
    positions.needsUpdate = true;
    geom.computeVertexNormals();
    return geom;
  }

  const blobGeom = makeOrganic(2.0, 4, 0.7, 0.28);
  const blobMat = new THREE.MeshPhysicalMaterial({
    color: 0x6a4a9c,
    metalness: 0.15,
    roughness: 0.2,
    transmission: 0.7,
    thickness: 1.2,
    ior: 1.45,
    clearcoat: 1.0,
    clearcoatRoughness: 0.15,
    iridescence: 0.45,
    iridescenceIOR: 1.3,
    transparent: true,
    opacity: 0.75,
    side: THREE.DoubleSide
  });
  coreBlob = new THREE.Mesh(blobGeom, blobMat);
  coreGroup.add(coreBlob);

  // Vnútorné svetlé jadro (žiariace)
  const glowGeom = new THREE.IcosahedronGeometry(1.0, 3);
  // jemne deformovať
  const gPos = glowGeom.attributes.position;
  for (let i = 0; i < gPos.count; i++) {
    const v = new THREE.Vector3().fromBufferAttribute(gPos, i);
    const n = Math.sin(v.x * 2 + 1) * 0.1 + Math.cos(v.y * 2 + 0.5) * 0.1;
    v.normalize().multiplyScalar(1.0 + n);
    gPos.setXYZ(i, v.x, v.y, v.z);
  }
  gPos.needsUpdate = true;
  glowGeom.computeVertexNormals();

  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffd6ec,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  coreGlow = new THREE.Mesh(glowGeom, glowMat);
  coreGroup.add(coreGlow);

  // Vonkajšia halo (mäkký glow)
  const haloGeom = new THREE.SphereGeometry(3.0, 32, 32);
  const haloMat = new THREE.MeshBasicMaterial({
    color: 0xff9bd3,
    transparent: true,
    opacity: 0.08,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.BackSide
  });
  coreHalo = new THREE.Mesh(haloGeom, haloMat);
  coreGroup.add(coreHalo);

  // ── ČIASTOČKY (farebný prach) ──
  const partCount = 1500;
  const partPositions = new Float32Array(partCount * 3);
  const partColors    = new Float32Array(partCount * 3);

  for (let i = 0; i < partCount; i++) {
    const r = 3.5 + Math.pow(Math.random(), 0.7) * 16;
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const flatten = 0.6 + Math.random() * 0.4;
    partPositions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    partPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * flatten;
    partPositions[i*3+2] = r * Math.cos(phi);

    const tone = Math.random();
    if (tone < 0.4) {
      const w = 0.85 + Math.random() * 0.15;
      partColors[i*3] = w; partColors[i*3+1] = w; partColors[i*3+2] = w;
    } else if (tone < 0.7) {
      partColors[i*3] = 1.0; partColors[i*3+1] = 0.72; partColors[i*3+2] = 0.9;  // ružová
    } else if (tone < 0.88) {
      partColors[i*3] = 0.6; partColors[i*3+1] = 0.7; partColors[i*3+2] = 1.0;   // modrá
    } else {
      partColors[i*3] = 1.0; partColors[i*3+1] = 0.85; partColors[i*3+2] = 0.65; // broskyňová
    }
  }

  const partGeom = new THREE.BufferGeometry();
  partGeom.setAttribute('position', new THREE.BufferAttribute(partPositions, 3));
  partGeom.setAttribute('color',    new THREE.BufferAttribute(partColors, 3));

  const partMat = new THREE.PointsMaterial({
    size: 0.07,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true,
    depthWrite: false
  });
  coreParticles = new THREE.Points(partGeom, partMat);
  coreGroup.add(coreParticles);

  // ── OBRÁZKY ──
  const loader = new THREE.TextureLoader();
  loader.crossOrigin = 'anonymous';

  allImages.forEach((img, i) => {
    const phi = Math.acos(-1 + (2 * i) / allImages.length);
    const theta = Math.sqrt(allImages.length * Math.PI) * phi;
    const radius = 5.5 + Math.random() * 3.5;
    const x = radius * Math.cos(theta) * Math.sin(phi);
    const y = radius * Math.sin(theta) * Math.sin(phi);
    const z = radius * Math.cos(phi);

    const baseSize = 0.95 + Math.random() * 0.65;
    const planeGeom = new THREE.PlaneGeometry(baseSize, baseSize);
    const mat = new THREE.MeshBasicMaterial({
      color: 0x1a1530, side: THREE.DoubleSide, transparent: true, opacity: 0.5
    });
    const plane = new THREE.Mesh(planeGeom, mat);
    plane.position.set(x, y, z);
    plane.userData = {
      img,
      baseSize,
      index: i,
      floatOffset: Math.random() * Math.PI * 2,
      floatAmp: 0.15 + Math.random() * 0.2,
      floatSpeed: 0.5 + Math.random() * 0.4,
      basePos: new THREE.Vector3(x, y, z)
    };
    coreGroup.add(plane);
    coreImages.push(plane);

    loader.load(picUrl(img, 400), (texture) => {
      // Rounded texture
      const roundedTex = makeRoundedTexture(texture.image, 0.06);
      mat.map = roundedTex;
      mat.color = new THREE.Color(0xffffff);
      mat.opacity = 1;
      mat.needsUpdate = true;

      const rawAspect = texture.image.width / texture.image.height;
      const aspect = Math.max(0.55, Math.min(1.85, rawAspect));
      const planeW = baseSize * Math.sqrt(aspect);
      const planeH = baseSize / Math.sqrt(aspect);

      plane.geometry.dispose();
      plane.geometry = new THREE.PlaneGeometry(planeW, planeH);
    });
  });

  coreRaycaster = new THREE.Raycaster();
  coreMouse = new THREE.Vector2();

  const canvas = coreRenderer.domElement;
  canvas.addEventListener('mousedown', onCoreMouseDown);
  window.addEventListener('mousemove', onCoreMouseMove);
  window.addEventListener('mouseup',   onCoreMouseUp);
  canvas.addEventListener('mousemove', onCoreHover);
  canvas.addEventListener('click', onCoreClick);

  animateCore();
}

function onCoreMouseDown(e) {
  coreDragState.dragging = true;
  coreDragState.moved = false;
  coreDragState.lastX = e.clientX;
  coreDragState.lastY = e.clientY;
  document.getElementById('core3d').classList.add('dragging');
}
function onCoreMouseUp() {
  coreDragState.dragging = false;
  document.getElementById('core3d').classList.remove('dragging');
}
function onCoreMouseMove(e) {
  if (!coreDragState.dragging) return;
  const dx = e.clientX - coreDragState.lastX;
  const dy = e.clientY - coreDragState.lastY;
  if (Math.abs(dx) + Math.abs(dy) > 3) coreDragState.moved = true;
  coreDragState.rotY += dx * 0.005;
  coreDragState.rotX += dy * 0.005;
  coreDragState.lastX = e.clientX;
  coreDragState.lastY = e.clientY;
}

function onCoreHover(e) {
  if (lightboxOpen) return;
  const rect = coreRenderer.domElement.getBoundingClientRect();
  coreMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  coreMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  coreRaycaster.setFromCamera(coreMouse, coreCamera);
  const intersects = coreRaycaster.intersectObjects(coreImages);
  if (intersects.length > 0) {
    coreHoveredObj = intersects[0].object;
    document.body.style.cursor = 'pointer';
  } else {
    coreHoveredObj = null;
    document.body.style.cursor = '';
  }
}

function onCoreClick(e) {
  if (coreDragState.moved) return;
  const rect = coreRenderer.domElement.getBoundingClientRect();
  coreMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  coreMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  coreRaycaster.setFromCamera(coreMouse, coreCamera);
  const intersects = coreRaycaster.intersectObjects(coreImages);
  if (intersects.length > 0) openLightbox(intersects[0].object.userData.index);
}

// ─── LIGHTBOX ───
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');

function openLightbox(idx) {
  lightboxIdx = idx;
  lbImg.src = picUrl(allImages[idx], 1200);
  lbCounter.textContent = `${idx + 1} / ${allImages.length}`;
  lightbox.classList.add('open');
  document.getElementById('core3d').classList.add('dimmed');
  lightboxOpen = true;
}
function closeLightbox() {
  lightbox.classList.remove('open');
  document.getElementById('core3d').classList.remove('dimmed');
  lightboxOpen = false;
}
function navLightbox(dir) {
  lightboxIdx = (lightboxIdx + dir + allImages.length) % allImages.length;
  lbImg.src = picUrl(allImages[lightboxIdx], 1200);
  lbCounter.textContent = `${lightboxIdx + 1} / ${allImages.length}`;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => navLightbox(-1));
document.getElementById('lbNext').addEventListener('click', () => navLightbox(1));
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', (e) => {
  if (!lightboxOpen) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 'ArrowLeft')  navLightbox(-1);
});

let touchStartX = 0;
lightbox.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, { passive: true });
lightbox.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) navLightbox(dx < 0 ? 1 : -1);
}, { passive: true });

// ─── ANIMÁCIA ───
function animateCore() {
  requestAnimationFrame(animateCore);
  const t = clock.getElapsedTime();
  const speedBoost = lightboxOpen ? 3.5 : 1.0;

  // Skupina rotuje pomaly + drag tlmenie
  coreGroup.rotation.y += 0.0008 * speedBoost;
  coreGroup.rotation.x += 0.0002 * speedBoost;
  coreGroup.rotation.y += coreDragState.rotY * 0.1;
  coreGroup.rotation.x += coreDragState.rotX * 0.1;
  coreDragState.rotY *= 0.88;
  coreDragState.rotX *= 0.88;

  // Centrálny blob rotuje a jemne pulzuje
  if (coreBlob) {
    coreBlob.rotation.x += 0.0015 * speedBoost;
    coreBlob.rotation.y += 0.002 * speedBoost;
    const pulse = 1 + Math.sin(t * 0.6) * 0.04;
    coreBlob.scale.setScalar(pulse);
  }
  if (coreGlow) {
    coreGlow.rotation.x -= 0.003 * speedBoost;
    coreGlow.rotation.y += 0.004 * speedBoost;
    const gPulse = 1 + Math.sin(t * 1.2) * 0.08;
    coreGlow.scale.setScalar(gPulse);
  }
  if (coreHalo) {
    const hPulse = 1 + Math.sin(t * 0.4) * 0.06;
    coreHalo.scale.setScalar(hPulse);
    coreHalo.material.opacity = 0.06 + Math.sin(t * 0.5) * 0.03;
  }

  if (coreParticles) {
    coreParticles.rotation.y += 0.0003 * speedBoost;
    coreParticles.rotation.x += 0.0001 * speedBoost;
  }

  // Floating animácia + billboard
  const camWorld = new THREE.Vector3();
  coreCamera.getWorldPosition(camWorld);

  coreImages.forEach(p => {
    const ud = p.userData;
    const bob = Math.sin(t * ud.floatSpeed + ud.floatOffset) * ud.floatAmp;
    p.position.copy(ud.basePos);
    p.position.y += bob;

    p.lookAt(coreGroup.worldToLocal(camWorld.clone()));

    const targetScale = (p === coreHoveredObj && !lightboxOpen) ? 1.5 : 1;
    const cs = p.scale.x;
    const ns = cs + (targetScale - cs) * 0.15;
    p.scale.set(ns, ns, ns);
  });

  coreRenderer.render(coreScene, coreCamera);
}

// ─── LOAD & START ───
async function loadFromFirebase() {
  try {
    const snap = await db.collection('images').orderBy('order').get();
    const real = snap.docs.map(d => ({ id: d.id, url: d.data().url }));
    if (real.length === 0) throw new Error('Žiadne obrázky');
    allImages = real;
    document.getElementById('loadStatus').textContent = `✓ ${real.length} obrázkov z portfolia`;
    setTimeout(() => { document.getElementById('loadStatus').style.opacity = '0'; }, 3000);
  } catch (e) {
    console.warn('Firebase load failed:', e);
    document.getElementById('loadStatus').textContent = '⚠ Používam ukážkové obrázky';
  }
}

(async () => {
  await loadFromFirebase();
  initCore();
})();

window.addEventListener('resize', () => {
  if (!coreRenderer) return;
  const c = document.getElementById('core3d');
  coreCamera.aspect = c.clientWidth / c.clientHeight;
  coreCamera.updateProjectionMatrix();
  coreRenderer.setSize(c.clientWidth, c.clientHeight);
});
</script>
